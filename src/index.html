<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/3d-force-graph"></script>
    <script src="https://cdn.jsdelivr.net/npm/force-graph"></script>
    <title>Graph View</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
      #3d-graph {
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="graph"></div>

    <script type="module">
      import SpriteText from 'https://esm.sh/three-spritetext';

      const IS_3D = false;

      let Graph;
      const doiTitleCache = new Map();

      function isDoi(name) {
        return /^articles\/[^/]+\.bookmark(\.md)?$/.test(name);
      }

      function getDoiFromName(name) {
        const match = name.match(/^articles\/([^/]+)\.bookmark(\.md)?$/);
        if (match) {
          return match[1].replace(/_/g, '/');
        }
        return null;
      }

      async function fetchDoiTitle(doi) {
        if (doiTitleCache.has(doi)) {
          return doiTitleCache.get(doi);
        }
        try {
          const response = await fetch(`https://api.crossref.org/works/${encodeURIComponent(doi)}`);
          if (response.ok) {
            const data = await response.json();
            const title = data.message?.title?.[0] || null;
            doiTitleCache.set(doi, title);
            return title;
          }
        } catch (e) {
          console.error('Error fetching DOI:', e);
        }
        return null;
      }

      function getTooltipHtml(node) {
        let title = node.title;
        if (!node.hasFile && isDoi(node.name)) {
          const doi = getDoiFromName(node.name);
          if (doi && doiTitleCache.has(doi)) {
            title = doiTitleCache.get(doi) || node.name;
          }
        }
        
        let metadataHtml = '';
        if (node.metadata) {
          for (const [key, value] of Object.entries(node.metadata)) {
            if (key !== 'title') {
              metadataHtml += `<br><span style="color:#888">${key}: ${value}</span>`;
            }
          }
        }
        
        return `<b id="tooltip-title-${node.name}">${title}</b><br><span style="color:#888">${node.notebook}${node.isExternal ? ' (external)' : ''}${!node.hasFile ? ' (missing)' : ''}</span>${metadataHtml}<br><span style="color:#666">${node.linkCount} links</span>`;
      }

      async function renderGraph(gData) {
        const elem = document.getElementById('graph');
        
        if (Graph) {
          Graph._destructor();
        }

        const maxLinks = Math.max(...gData.nodes.map(n => n.linkCount || 0), 1);

        Graph = (IS_3D ? new ForceGraph3D(elem) : new ForceGraph(elem))
          .width(window.innerWidth)
          .height(window.innerHeight)
          .backgroundColor('#000000')
          //.backgroundColor('#0d1117')
          .nodeVal(node => {
            const count = node.linkCount || 1;
            return 2 + (count / maxLinks) * 6;
          })
          .nodeColor(node => {
            //if (!node.hasFile) return '#6e7681';
            if (!node.hasFile) return '#B7C5D799';
            if (node.isExternal) return '#f85149';
            const colors = ['#58a6ff', '#f78166', '#7ee787', '#d2a8ff', '#ffa657'];
            return colors[node.id % colors.length];
          })
          .nodeLabel(node => getTooltipHtml(node))
          .onNodeHover(async (node) => {
            if (node && !node.hasFile && isDoi(node.name)) {
              const doi = getDoiFromName(node.name);
              if (doi && !doiTitleCache.has(doi)) {
                await fetchDoiTitle(doi);
                const titleEl = document.getElementById(`tooltip-title-${node.name}`);
                if (titleEl) {
                  titleEl.textContent = doiTitleCache.get(doi) || node.name;
                }
              }
            }
          })
          .linkColor(link => {
	      const start = link.source;
              const end = link.target;
              if (typeof start !== 'object' || typeof end !== 'object') return;

	      if(start.hasFile && end.hasFile) return '#80868d';
	      return '#30363d';
          })
          .graphData(gData)
          .onNodeClick(node => {
            Graph.centerAt(node.x, node.y, 1000);
            Graph.zoom(8, 2000);
          })
          .onBackgroundClick(() => {
            Graph.zoomToFit(1000, 50);
          })
          .onNodeRightClick((node, event) => {
            electron.openNode(node.name);
          });

	if (IS_3D) {
	    Graph.nodeThreeObject(node => {
              if (!node.hasFile) return null;
              const sprite = new SpriteText(node.title);
              sprite.color = node.isExternal ? '#f85149' : '#c9d1d9';
              sprite.textHeight = 4;
              sprite.center.y = -0.6;
              return sprite;
            })
          .nodeThreeObjectExtend(true)
	  .showNavInfo(false)
	} else {
	   Graph.nodeCanvasObjectMode(()=>'after')
	   .nodeCanvasObject((node, ctx) => {
	      if (!node.hasFile) return;
	      const label = node.title;
	      const fontSize = 12;
	      ctx.font = `${fontSize}px Sans-Serif`;
	      const textWidth = ctx.measureText(label).width;
	      ctx.fillStyle = node.isExternal ? '#f85149' : '#c9d1d9';
	      ctx.fillText(label, node.x - textWidth / 2, node.y + 25);
	    })
	}

        window.addEventListener('resize', () => {
          Graph
            .width(window.innerWidth)
            .height(window.innerHeight);
        });
      }

      if (window.electron) {
        electron.onGraphData((data) => {
          renderGraph(data);
        });
      }


      let hidden = false;
      document.addEventListener ('keypress', (event) => {
	 if (event.key === ".") {
	    hidden = !hidden;
	    Graph.nodeColor(node => {
	      if (!node.hasFile) return hidden ? '#b7c5d710' : '#B7C5D799';
	      if (node.isExternal) return hidden ? '#f85149' : '#f85149';
	      const colors = ['#58a6ff', '#f78166', '#7ee787', '#d2a8ff', '#ffa657'];
	      return colors[node.id % colors.length];
	      })
	    .linkColor(link => {
	      const start = link.source;
              const end = link.target;
              if (typeof start !== 'object' || typeof end !== 'object') return;

	      if(start.hasFile && end.hasFile) return '#80868d';
	      return hidden ? '#30363d10' : '#30363d';
	      })
	   if (IS_3D) {
	      Graph.nodeVisibility(node => {
	      	return !(!node.hasFile && hidden);
	      });
	   }
	 }
      });
    </script>
  </body>
</html>
